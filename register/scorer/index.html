<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>B2L スコアラー</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1a1a2e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="stylesheet" href="css/scorer.css">
</head>
<body>
    <!-- ===== ログイン画面 ===== -->
    <div id="screen-login" class="screen active">
        <div class="login-box">
            <h1>🏀 B2L スコアラー</h1>
            <p>APIトークンを入力してください</p>
            <input type="text" id="token-input" placeholder="トークンを入力">
            <button onclick="App.login()" class="btn-primary">ログイン</button>
            <p id="login-error" class="error"></p>
        </div>
    </div>

    <!-- ===== 試合選択画面 ===== -->
    <div id="screen-games" class="screen">
        <header>
            <h2>試合一覧</h2>
            <button onclick="App.logout()" class="btn-sm">ログアウト</button>
        </header>
        <div id="games-list" class="games-list"></div>
    </div>

    <!-- ===== スコアリング画面 ===== -->
    <div id="screen-scoring" class="screen">
        <!-- スコアボード -->
        <div id="scoreboard">
            <div class="team-score home">
                <span class="team-name" id="home-name">HOME</span>
                <span class="score" id="home-score">0</span>
                <span class="fouls">ファウル: <span id="home-fouls">0</span></span>
            </div>
            <div class="game-info">
                <span class="quarter" id="quarter-display">1Q</span>
                <span class="time" id="time-display">10:00</span>
                <div class="game-controls">
                    <button onclick="Game.prevQuarter()" class="btn-xs">◀</button>
                    <button onclick="Game.nextQuarter()" class="btn-xs">▶</button>
                </div>
            </div>
            <div class="team-score away">
                <span class="team-name" id="away-name">AWAY</span>
                <span class="score" id="away-score">0</span>
                <span class="fouls">ファウル: <span id="away-fouls">0</span></span>
            </div>
        </div>

        <!-- チーム切替タブ -->
        <div class="team-tabs">
            <button id="tab-home" class="team-tab active" onclick="Game.selectTeam('home')">HOME</button>
            <button id="tab-away" class="team-tab" onclick="Game.selectTeam('away')">AWAY</button>
        </div>

        <!-- 選手グリッド -->
        <div id="players-grid" class="players-grid"></div>

        <!-- 選手選択時のアクションパネル -->
        <div id="action-panel" class="action-panel hidden">
            <div class="selected-player">
                <span id="selected-player-name">#0 選手名</span>
                <button onclick="Game.deselectPlayer()" class="btn-close">✕</button>
            </div>
            <div class="action-buttons">
                <div class="action-group">
                    <h4>シュート</h4>
                    <button onclick="Game.record('fgm', 2)" class="btn-action btn-made">2P○</button>
                    <button onclick="Game.record('fga', 0)" class="btn-action btn-miss">2P✕</button>
                    <button onclick="Game.record('3pm', 3)" class="btn-action btn-made btn-three">3P○</button>
                    <button onclick="Game.record('3pa', 0)" class="btn-action btn-miss">3P✕</button>
                    <button onclick="Game.record('ftm', 1)" class="btn-action btn-made btn-ft">FT○</button>
                    <button onclick="Game.record('fta', 0)" class="btn-action btn-miss">FT✕</button>
                </div>
                <div class="action-group">
                    <h4>その他</h4>
                    <button onclick="Game.record('oreb', 0)" class="btn-action">OREB</button>
                    <button onclick="Game.record('dreb', 0)" class="btn-action">DREB</button>
                    <button onclick="Game.record('ast', 0)" class="btn-action">AST</button>
                    <button onclick="Game.record('stl', 0)" class="btn-action">STL</button>
                    <button onclick="Game.record('blk', 0)" class="btn-action">BLK</button>
                    <button onclick="Game.record('turnover', 0)" class="btn-action btn-neg">TO</button>
                    <button onclick="Game.record('foul', 0)" class="btn-action btn-neg">FOUL</button>
                </div>
            </div>
        </div>

        <!-- 直近プレイログ＋UNDO -->
        <div id="play-log" class="play-log">
            <h4>プレイログ <button onclick="Game.toggleBoxScore()" class="btn-xs">📊 BOX</button></h4>
            <div id="play-list"></div>
        </div>

        <!-- ボックススコア（オーバーレイ） -->
        <div id="boxscore-overlay" class="overlay hidden">
            <div class="overlay-content">
                <button onclick="Game.toggleBoxScore()" class="btn-close">✕</button>
                <h3>ボックススコア</h3>
                <div id="boxscore-content"></div>
            </div>
        </div>

        <!-- フッター操作 -->
        <div class="footer-controls">
            <button onclick="App.showScreen('games')" class="btn-sm">← 試合一覧</button>
            <button onclick="Game.finishGame()" class="btn-sm btn-danger">試合終了</button>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script src="js/game.js"></script>
</body>
</html>
